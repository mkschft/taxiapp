name: Content sync (Sheet → PR)

# P2 of docs/plans/content-pipeline-plan.md.
# The editor publishes the Google Sheet as CSV, runs this from the Actions tab,
# and pastes the published-CSV URL. The job: fetch CSV → merge into questions.json
# → run the validation gate → open a PR. If the gate fails, the run fails with the
# exact errors and NO PR is opened — nothing broken can reach master.
#
# One-time setup: Settings → Actions → General → Workflow permissions →
# "Read and write permissions" + "Allow GitHub Actions to create and approve PRs".

on:
  workflow_dispatch:
    inputs:
      csv_url:
        description: 'Published-CSV URL of the question Sheet (File → Share → Publish to web → CSV)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Merge Sheet CSV into questions.json
        run: node scripts/sync-sheet.mjs --url "${{ inputs.csv_url }}"

      - name: Validation gate (must pass before a PR is opened)
        run: node scripts/check-data-integrity.mjs

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: content-sync/run-${{ github.run_id }}
          commit-message: 'content: sync questions from Sheet (run ${{ github.run_id }})'
          title: 'Content sync from Sheet (run ${{ github.run_id }})'
          body: |
            Automated content sync from the editor Sheet.

            - Source: published CSV provided to the workflow run.
            - The validation gate (`check:data`) passed on this content before the PR opened.
            - Review the diff below, then merge. Only `approved` questions enter Model Exams.

            _Generated by `.github/workflows/content-sync.yml` (P2)._
          add-paths: src/data/json/questions.json
