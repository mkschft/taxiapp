# Deploy: test → build → deploy static web app to VPS via SSH/atomic swap
#
# Required GitHub secrets:
#   APP_HOST              — VPS IP address or hostname
#   APP_USER              — SSH user (e.g., deploy, ubuntu)
#   APP_SSH_PRIVATE_KEY   — ed25519 private key for the deploy user
#
# Server prerequisites (run once):
#   sudo chown -R $USER:$USER /var/www/taxipilot

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check data integrity
        run: node scripts/check-data-integrity.mjs

      - name: Build for web
        run: |
          npx expo export --platform web
          node scripts/postbuild-web.js

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check data integrity
        run: node scripts/check-data-integrity.mjs

      - name: Build for web
        run: |
          npx expo export --platform web
          node scripts/postbuild-web.js

      - name: Package dist
        run: tar -czf app-dist.tar.gz -C dist .

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: app-dist.tar.gz
          retention-days: 1

      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.APP_SSH_PRIVATE_KEY }}
          source: 'app-dist.tar.gz'
          target: '~/'
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.APP_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_DIR="/var/www/taxipilot"
            NEW_DIR="${DEPLOY_DIR}.new"
            OLD_DIR="${DEPLOY_DIR}.old"

            # Extract to a temporary new directory
            mkdir -p "$NEW_DIR"
            tar -xzf ~/app-dist.tar.gz -C "$NEW_DIR"
            rm -f ~/app-dist.tar.gz

            # Atomic swap
            rm -rf "$OLD_DIR"
            mv "$DEPLOY_DIR" "$OLD_DIR" || true
            mv "$NEW_DIR" "$DEPLOY_DIR"
            rm -rf "$OLD_DIR"

            echo "Deployment complete"
